<!DOCTYPE html>
<html>
<head>
  <title>WhatsApp Chat Clone</title>

  <!-- Firebase (compat version - works in simple HTML) -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b141a;
      color: white;
    }

    header {
      background: #075e54;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    #loginBtn {
      margin: 20px;
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: white;
      color: black;
    }

    #chat {
      display: none;
      height: 90vh;
      flex-direction: column;
    }

    #messages {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .msg {
      max-width: 70%;
      padding: 10px;
      margin: 5px;
      border-radius: 10px;
      word-wrap: break-word;
    }

    .me {
      background: #25d366;
      align-self: flex-end;
    }

    .other {
      background: #2a3942;
      align-self: flex-start;
    }

    #inputBox {
      display: flex;
      padding: 10px;
      background: #1f2c34;
    }

    input {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 5px;
    }

    button {
      margin-left: 10px;
      padding: 10px;
      border: none;
      border-radius: 5px;
      background: #25d366;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header>WhatsApp Chat Clone</header>

<button id="loginBtn" onclick="login()">Login with Google</button>

<div id="chat">
  <div id="messages"></div>

  <div id="inputBox">
    <input id="msg" placeholder="Type message">
    <button onclick="sendMsg()">Send</button>
  </div>
</div>

<script>
/* 🔥 FIREBASE CONFIG - REPLACE THIS (VERY IMPORTANT) */
const firebaseConfig = {
  apiKey: "PASTE_YOUR_API_KEY_HERE",
  authDomain: "PASTE_YOUR_AUTH_DOMAIN",
  projectId: "PASTE_YOUR_PROJECT_ID",
  storageBucket: "PASTE_STORAGE_BUCKET",
  messagingSenderId: "PASTE_SENDER_ID",
  appId: "PASTE_APP_ID"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

/* 🔐 LOGIN */
function login() {
  const provider = new firebase.auth.GoogleAuthProvider();

  auth.signInWithPopup(provider)
    .catch(err => alert(err.message));
}

/* 👤 AUTH STATE */
auth.onAuthStateChanged(user => {
  if (user) {
    document.getElementById("loginBtn").style.display = "none";
    document.getElementById("chat").style.display = "flex";
    loadMessages();
  }
});

/* 💬 SEND MESSAGE */
function sendMsg() {
  const text = document.getElementById("msg").value;
  if (!text) return;

  db.collection("messages").add({
    text: text,
    user: auth.currentUser.email,
    time: Date.now()
  });

  document.getElementById("msg").value = "";
}

/* 📡 LOAD MESSAGES */
function loadMessages() {
  db.collection("messages")
    .orderBy("time")
    .onSnapshot(snapshot => {
      let html = "";

      snapshot.forEach(doc => {
        const d = doc.data();
        const isMe = d.user === auth.currentUser.email;

        html += `
          <div class="msg ${isMe ? "me" : "other"}">
            <b>${d.user}</b><br>${d.text}
          </div>
        `;
      });

      const box = document.getElementById("messages");
      box.innerHTML = html;
      box.scrollTop = box.scrollHeight;
    });
}
</script>

</body>
</html>
